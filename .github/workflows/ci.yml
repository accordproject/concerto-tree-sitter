name: CI

on:
  push:
    branches: [main]
    paths:
      - grammar.js
      - src/**
      - test/**
      - queries/**
      - examples/**
      - bindings/**
      - tree-sitter.json
      - package.json
      - Cargo.toml
      - go.mod
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - grammar.js
      - src/**
      - test/**
      - queries/**
      - examples/**
      - bindings/**
      - tree-sitter.json
      - package.json
      - Cargo.toml
      - go.mod
      - .github/workflows/ci.yml

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Test parser
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Run parser and highlight tests
        uses: tree-sitter/parser-test-action@v2

      - name: Parse example files
        uses: tree-sitter/parse-action@v4
        id: parse-examples
        with:
          files: examples/*.cto

      - name: Upload parse failures
        uses: actions/upload-artifact@v4
        if: "!cancelled() && steps.parse-examples.outcome == 'failure'"
        with:
          name: parse-failures-${{matrix.os}}
          path: ${{steps.parse-examples.outputs.failures}}

  query-validation:
    name: Validate queries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Generate parser
        run: tree-sitter generate

      - name: Run query validation tests
        run: bash test/test-queries.sh

  lint-queries:
    name: Lint queries (ts_query_ls)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ts_query_ls
        run: cargo install ts_query_ls

      - name: Generate and build parser
        run: |
          tree-sitter generate
          tree-sitter build -o concerto.so

      - name: Lint and check query formatting
        run: |
          # ts_query_ls expects queries under queries/<language>/ to determine
          # the language name. Grammar repos store queries at queries/ directly,
          # so we create a temporary symlinked directory structure.
          mkdir -p /tmp/ts-queries/concerto
          for f in queries/*.scm; do
            ln -sf "$PWD/$f" /tmp/ts-queries/concerto/
          done
          ts_query_ls check --format --workspace . /tmp/ts-queries/

  test-rust-binding:
    name: Test Rust binding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test

  test-go-binding:
    name: Test Go binding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate go.sum
        run: go mod tidy

      - name: Run Go tests
        run: go test ./bindings/go/
